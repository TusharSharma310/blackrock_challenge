name: Build and Publish Docker Image

on:
  push:
    branches:
      - main  # triggers workflow on pushes to main
    tags:
      - 'v*'  # triggers workflow on git tags like v1.0.0
  workflow_dispatch:  # allows manual run

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Login to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Step 3: Determine tags
      - name: Set Docker tags
        id: docker-tags
        run: |
          # Use git tag if present, else latest
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=latest
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "IMAGE=ghcr.io/TusharSharma310/blk-hacking-ind-name-lastname" >> $GITHUB_ENV

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:latest -t ${{ env.IMAGE }}:${{ env.TAG }} .

      # Step 5: Push Docker image
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ env.TAG }}