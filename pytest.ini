[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for API endpoints
    load: Load/performance tests
    slow: Slow tests (skip with -m "not slow")
